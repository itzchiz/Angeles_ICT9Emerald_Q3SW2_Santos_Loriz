<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Q3 Seatwork 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-image: url("https://images.unsplash.com/photo-1518770660439-4636190af475");
            background-size: cover;
            color:white;
            text-align:center;}

        .box{
            background: rgba(0,0,0,0.6);
            padding:40px;
            border-radius:10px;
            margin-top:100px;}
    </style>
</head>

<body>
	<header>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Product Locator</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">

        <li class="nav-item">
          <a class="nav-link active" href="#">Shop</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Locate</a>
        </li>
     </ul>
      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="Search">
        <button class="btn btn-light" type="submit">Search</button>
      </form>

    </div>

  </div>
</nav>
</header>

<h1 class="mt-4">Product Locator</h1>

<div class="container">
<div class="box">

<h2>Find a Gaming Laptop</h2>


<p>Enter your budget and we will recommend a laptop brand for you.</p>

<input type="number" id="budget" class="form-control" placeholder="Enter your budget">

<br>

<button onclick="recommendLaptop()" class="btn btn-primary">
Find Laptop
</button>

<br><br>

<h3 id="result"></h3>

<br>

<p>Source: 
<a href="https://www.w3schools.com" target="_blank">
W3Schools
</a>
</p>
</div>
</div>
<script>

// Function that runs when the button is clicked
function recommendLaptop(){

    // Get users budget input
    let budget = document.getElementById("budget").value;

    let brand;

    // Check budget and give laptop brand
    if(budget >= 80000){
        brand = "Razer";
    }
    else if(budget >= 60000){
        brand = "Asus";
    }
    else if(budget >= 40000){
        brand = "Acer";
    }
    else if(budget >= 25000){
        brand = "Lenovo";
    }
    else{
        brand = "Budget too low for gaming laptops.";
    }

    // Display result on the webpage
    document.getElementById("result").innerHTML =
    "Recommended Brand: " + brand;}

</script>

</body>
</html>
